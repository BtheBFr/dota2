<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DOTA 2 MINI - Real-time Strategy MOBA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            display: inline-block;
        }

        canvas {
            display: block;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            cursor: crosshair;
            border: 2px solid #e6b422;
        }

        .ui-panel {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffd966;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #e6b422;
            pointer-events: none;
            z-index: 10;
        }

        .hero-stats {
            display: flex;
            gap: 20px;
        }

        .hero-stats span {
            color: white;
            margin-left: 5px;
        }

        .inventory {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 8px;
            pointer-events: auto;
        }

        .inv-slot {
            width: 45px;
            height: 45px;
            background: #2a2e3f;
            border: 1px solid #e6b422;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            transition: 0.1s;
            color: #ffd966;
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
        }

        .inv-slot:hover {
            background: #3a3e55;
            transform: scale(1.05);
        }

        .inv-slot:active {
            transform: scale(0.95);
        }

        .shop {
            position: absolute;
            bottom: 80px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 10px;
            width: 180px;
            border: 1px solid #e6b422;
            pointer-events: auto;
            z-index: 20;
            font-size: 11px;
        }

        .shop h4 {
            color: #e6b422;
            margin-bottom: 8px;
            text-align: center;
        }

        .shop-item {
            background: #1e2438;
            margin: 5px 0;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            transition: 0.1s;
        }

        .shop-item:hover {
            background: #e6b422;
            color: black;
        }

        .gold {
            color: #ffd966;
            font-size: 18px;
        }

        .kill-counter {
            color: #ff7777;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1200" height="700"></canvas>
    <div class="ui-panel">
        <div class="hero-stats">
            <div>❤️ HP: <span id="hpValue">0</span></div>
            <div>⚔️ DMG: <span id="dmgValue">0</span></div>
            <div>🛡️ ARMOR: <span id="armorValue">0</span></div>
        </div>
        <div class="gold">💰 GOLD: <span id="goldValue">500</span></div>
        <div class="kill-counter">💀 KILLS: <span id="killValue">0</span></div>
        <div class="inventory" id="inventory"></div>
    </div>
    <div class="shop" id="shopPanel">
        <h4>🏪 SHOP</h4>
        <div class="shop-item" data-item="blade">⚔️ Blade of Attack (+12 dmg) - 450g</div>
        <div class="shop-item" data-item="armor">🛡️ Chainmail (+5 armor) - 550g</div>
        <div class="shop-item" data-item="health">❤️ Vitality Booster (+200 HP) - 800g</div>
        <div class="shop-item" data-item="heal">💊 Healing Salve (Heal 150) - 100g</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ========== GAME CONSTANTS ==========
    const W = 1200, H = 700;
    
    // ========== HERO CLASS ==========
    class Hero {
        constructor(x, y, name) {
            this.x = x;
            this.y = y;
            this.name = name;
            this.maxHp = 750;
            this.hp = 750;
            this.baseDmg = 28;
            this.dmgBonus = 0;
            this.armor = 3;
            this.armorBonus = 0;
            this.speed = 4.2;
            this.radius = 24;
            this.attackRange = 95;
            this.attackCooldown = 0;
            this.attackSpeed = 0.65; // seconds per attack
            this.lastAttack = 0;
            this.gold = 500;
            this.kills = 0;
            this.inventory = [null, null, null];
        }

        get totalDmg() { return this.baseDmg + this.dmgBonus; }
        get totalArmor() { return this.armor + this.armorBonus; }
        
        takeDamage(amount) {
            let physReduction = this.totalArmor * 0.06 / (1 + this.totalArmor * 0.06);
            let dmgTaken = amount * (1 - physReduction);
            dmgTaken = Math.max(5, dmgTaken);
            this.hp -= dmgTaken;
            if(this.hp <= 0) this.hp = 0;
            return dmgTaken;
        }
        
        addItem(item) {
            for(let i=0; i<this.inventory.length; i++) {
                if(this.inventory[i] === null) {
                    this.inventory[i] = item;
                    if(item.effect) item.effect(this);
                    return true;
                }
            }
            return false;
        }
        
        useItem(slot) {
            let item = this.inventory[slot];
            if(item && item.use) {
                let used = item.use(this);
                if(used) this.inventory[slot] = null;
            }
        }
        
        attackTarget(target) {
            let now = performance.now() / 1000;
            if(now - this.lastAttack < this.attackSpeed) return false;
            let dx = target.x - this.x;
            let dy = target.y - this.y;
            let dist = Math.hypot(dx, dy);
            if(dist < this.attackRange + target.radius) {
                let dmg = this.totalDmg + Math.floor(Math.random() * 12);
                let dealt = target.takeDamage(dmg);
                this.lastAttack = now;
                return {dealt, target};
            }
            return false;
        }
        
        moveToward(tx, ty, allObstacles) {
            let dx = tx - this.x;
            let dy = ty - this.y;
            let len = Math.hypot(dx, dy);
            if(len > 1) {
                let move = Math.min(this.speed, len);
                let stepX = (dx / len) * move;
                let stepY = (dy / len) * move;
                let newX = this.x + stepX;
                let newY = this.y + stepY;
                // collision with other units (avoid stacking)
                let collide = false;
                for(let u of allObstacles) {
                    if(u === this) continue;
                    let d = Math.hypot(newX - u.x, newY - u.y);
                    if(d < this.radius + u.radius) {
                        collide = true;
                        break;
                    }
                }
                if(!collide) {
                    this.x = newX;
                    this.y = newY;
                }
            }
        }
        
        draw() {
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.name === "Luna" ? "#b87333" : "#4a90e2";
            ctx.fill();
            ctx.strokeStyle = "#e6b422";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = "white";
            ctx.font = "bold 16px Arial";
            ctx.fillText(this.name, this.x-20, this.y-28);
            ctx.fillStyle = "#ff5555";
            ctx.fillRect(this.x-25, this.y-32, 50, 6);
            ctx.fillStyle = "#55ff55";
            let hpPercent = this.hp/this.maxHp;
            ctx.fillRect(this.x-25, this.y-32, 50*hpPercent, 6);
            ctx.fillStyle = "gold";
            ctx.font = "12px monospace";
            ctx.fillText(`⚔️${this.totalDmg} 🛡️${this.totalArmor}`, this.x-22, this.y-38);
            ctx.restore();
        }
    }
    
    // ========== CREEP CLASS ==========
    class Creep {
        constructor(x, y, team, type) {
            this.x = x;
            this.y = y;
            this.team = team; // "radiant" or "dire"
            this.type = type;
            this.maxHp = type === "melee" ? 550 : 400;
            this.hp = this.maxHp;
            this.damage = type === "melee" ? 24 : 18;
            this.radius = 20;
            this.attackRange = 70;
            this.attackCooldown = 0;
            this.lastAttack = 0;
            this.attackSpeed = 1.0;
            this.speed = 1.8;
            this.target = null;
        }
        
        takeDamage(amount) {
            this.hp -= amount;
            return amount;
        }
        
        attackTarget(target) {
            let now = performance.now() / 1000;
            if(now - this.lastAttack < this.attackSpeed) return false;
            let dist = Math.hypot(this.x - target.x, this.y - target.y);
            if(dist < this.attackRange + target.radius) {
                let dmg = this.damage + Math.floor(Math.random() * 8);
                target.takeDamage(dmg);
                this.lastAttack = now;
                return true;
            }
            return false;
        }
        
        moveToward(target, allUnits) {
            if(!target) return;
            let dx = target.x - this.x;
            let dy = target.y - this.y;
            let len = Math.hypot(dx, dy);
            if(len > 5) {
                let move = Math.min(this.speed, len-5);
                let stepX = (dx/len)*move;
                let stepY = (dy/len)*move;
                let newX = this.x+stepX;
                let newY = this.y+stepY;
                let collide = false;
                for(let u of allUnits) {
                    if(u===this) continue;
                    if(Math.hypot(newX-u.x, newY-u.y) < this.radius+u.radius) {
                        collide=true; break;
                    }
                }
                if(!collide) {
                    this.x=newX;
                    this.y=newY;
                }
            }
        }
        
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.team === "radiant" ? "#6fbf4c" : "#b84c4c";
            ctx.fill();
            ctx.strokeStyle = "#333";
            ctx.stroke();
            ctx.fillStyle = "white";
            ctx.font = "10px Arial";
            ctx.fillText(this.type==="melee"?"👊":"🏹", this.x-8, this.y-8);
            ctx.fillStyle = "#ff8888";
            ctx.fillRect(this.x-15, this.y-18, 30, 4);
            ctx.fillStyle = "#88ff88";
            ctx.fillRect(this.x-15, this.y-18, 30*(this.hp/this.maxHp), 4);
        }
    }
    
    // ========== ITEMS ==========
    const itemsDB = {
        blade: { name:"Blade", effect:(h)=> h.dmgBonus+=12, desc:"+12 dmg" },
        armor: { name:"Armor", effect:(h)=> h.armorBonus+=5, desc:"+5 armor" },
        health: { name:"Vitality", effect:(h)=> { h.maxHp+=200; h.hp+=200; }, desc:"+200 HP" },
        heal: { name:"Salve", use:(h)=> { if(h.hp+150 <= h.maxHp) h.hp+=150; else h.hp=h.maxHp; return true; }, desc:"Heal 150" }
    };
    
    // ========== GLOBAL STATE ==========
    let hero = new Hero(W/2, H/2, "Luna");
    let enemies = []; // bot heroes
    let creeps = [];
    let gameTime = 0;
    let spawnCounter = 0;
    let mouseX = hero.x, mouseY = hero.y;
    let rightClick = false;
    
    // enemy bots: Zeus
    let enemyHero = new Hero(1000, 500, "Zeus");
    enemyHero.maxHp = 720;
    enemyHero.hp = 720;
    enemyHero.baseDmg = 30;
    enemyHero.team = "dire";
    enemies.push(enemyHero);
    
    // second bot: Juggernaut
    let enemyHero2 = new Hero(1050, 350, "Juggernaut");
    enemyHero2.maxHp = 780;
    enemyHero2.hp = 780;
    enemyHero2.baseDmg = 32;
    enemyHero2.team = "dire";
    enemies.push(enemyHero2);
    
    // ========== HELPER FUNCTIONS ==========
    function spawnCreeps() {
        creeps.push(new Creep(200, 200, "radiant", "melee"));
        creeps.push(new Creep(230, 270, "radiant", "ranged"));
        creeps.push(new Creep(1000, 550, "dire", "melee"));
        creeps.push(new Creep(1050, 600, "dire", "ranged"));
        creeps.push(new Creep(970, 500, "dire", "melee"));
        creeps.push(new Creep(180, 150, "radiant", "melee"));
    }
    
    function updateUI() {
        document.getElementById("hpValue").innerText = Math.floor(hero.hp)+"/"+hero.maxHp;
        document.getElementById("dmgValue").innerText = hero.totalDmg;
        document.getElementById("armorValue").innerText = hero.totalArmor;
        document.getElementById("goldValue").innerText = Math.floor(hero.gold);
        document.getElementById("killValue").innerText = hero.kills;
        
        let invDiv = document.getElementById("inventory");
        invDiv.innerHTML = "";
        for(let i=0; i<hero.inventory.length; i++) {
            let item = hero.inventory[i];
            let slotDiv = document.createElement("div");
            slotDiv.className = "inv-slot";
            slotDiv.innerText = item ? item.name : "Empty";
            slotDiv.onclick = (function(idx){ return function(){ hero.useItem(idx); updateUI(); }; })(i);
            invDiv.appendChild(slotDiv);
        }
    }
    
    // AI for enemy heroes
    function updateEnemyAI() {
        for(let e of enemies) {
            let distToHero = Math.hypot(e.x - hero.x, e.y - hero.y);
            if(distToHero < 280) {
                e.moveToward(hero.x, hero.y, [...enemies, hero, ...creeps]);
                let attack = e.attackTarget(hero);
                if(attack && hero.hp <= 0) {
                    // hero dead
                }
            } else {
                // patrol / move toward lane
                let targetCreep = creeps.find(c => c.team === "radiant" && Math.hypot(c.x-e.x, c.y-e.y) < 400);
                if(targetCreep) e.moveToward(targetCreep.x, targetCreep.y, [...enemies, hero, ...creeps]);
                else e.moveToward(400, 350, [...enemies, hero, ...creeps]);
            }
            // attack creeps
            for(let c of creeps) {
                if(c.team !== e.team && Math.hypot(e.x-c.x, e.y-c.y) < e.attackRange+20) {
                    e.attackTarget(c);
                    break;
                }
            }
        }
    }
    
    function updateCreeps() {
        for(let i=0; i<creeps.length; i++) {
            let c = creeps[i];
            let target = null;
            if(c.team === "radiant") {
                // find nearest dire unit
                let enemiesNear = [...enemies, ...creeps.filter(cr=>cr.team==="dire")];
                let closest = null;
                let minDist = 500;
                for(let t of enemiesNear) {
                    let d = Math.hypot(c.x-t.x, c.y-t.y);
                    if(d < minDist) { minDist=d; closest=t; }
                }
                target = closest;
            } else {
                let enemiesNear = [hero, ...creeps.filter(cr=>cr.team==="radiant")];
                let closest = null;
                let minDist = 500;
                for(let t of enemiesNear) {
                    let d = Math.hypot(c.x-t.x, c.y-t.y);
                    if(d < minDist) { minDist=d; closest=t; }
                }
                target = closest;
            }
            if(target) {
                c.moveToward(target, [...creeps, hero, ...enemies]);
                c.attackTarget(target);
            } else {
                // move towards enemy base
                if(c.team === "radiant") c.moveToward(900, 500, [...creeps, hero, ...enemies]);
                else c.moveToward(300, 300, [...creeps, hero, ...enemies]);
            }
        }
    }
    
    function handleCombatAndGold() {
        // hero attacks with mouse click
        if(rightClick) {
            let closestEnemy = null;
            let minD = hero.attackRange+30;
            for(let e of enemies) {
                let d = Math.hypot(hero.x-e.x, hero.y-e.y);
                if(d < minD) { minD = d; closestEnemy = e; }
            }
            for(let c of creeps) {
                if(c.team !== "radiant") {
                    let d = Math.hypot(hero.x-c.x, hero.y-c.y);
                    if(d < minD) { minD = d; closestEnemy = c; }
                }
            }
            if(closestEnemy) hero.attackTarget(closestEnemy);
            rightClick = false;
        }
        
        // creep death & gold
        for(let i=0; i<creeps.length; i++) {
            let c = creeps[i];
            if(c.hp <= 0) {
                let killer = null;
                if(Math.hypot(hero.x-c.x, hero.y-c.y) < 150) killer = hero;
                for(let e of enemies) if(Math.hypot(e.x-c.x, e.y-c.y) < 150) killer = e;
                if(killer === hero) {
                    hero.gold += (c.type==="melee"? 45 : 35);
                    updateUI();
                }
                creeps.splice(i,1);
                i--;
            }
        }
        // enemy hero death
        for(let i=0; i<enemies.length; i++) {
            let e = enemies[i];
            if(e.hp <= 0) {
                if(Math.hypot(hero.x-e.x, hero.y-e.y) < 200) {
                    hero.gold += 220;
                    hero.kills++;
                    updateUI();
                }
                e.hp = e.maxHp;
                e.x = 1050 + Math.random()*100;
                e.y = 400 + Math.random()*200;
            }
        }
        if(hero.hp <= 0) {
            hero.hp = hero.maxHp;
            hero.x = 300;
            hero.y = 350;
            hero.gold = Math.max(0, hero.gold-100);
            updateUI();
        }
    }
    
    function spawnWaveTimer() {
        spawnCounter++;
        if(spawnCounter > 300) { // every ~5 seconds at 60fps
            creeps.push(new Creep(180, 220, "radiant", "melee"));
            creeps.push(new Creep(220, 280, "radiant", "ranged"));
            creeps.push(new Creep(1050, 530, "dire", "melee"));
            creeps.push(new Creep(1010, 580, "dire", "ranged"));
            spawnCounter = 0;
        }
    }
    
    // ========== DRAW ==========
    function drawBackground() {
        ctx.fillStyle = "#2a5730";
        ctx.fillRect(0,0,W,H);
        // lane lines
        ctx.strokeStyle = "#b8860b";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(0, H/2);
        ctx.lineTo(W, H/2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(W/2, 0);
        ctx.lineTo(W/2, H);
        ctx.stroke();
        ctx.fillStyle = "#8b5a2b";
        ctx.font = "bold 20px Arial";
        ctx.fillText("🌳 RADIANT BASE", 30, 60);
        ctx.fillStyle = "#5a2b2b";
        ctx.fillText("💀 DIRE BASE", W-200, H-40);
    }
    
    function draw() {
        drawBackground();
        hero.draw();
        for(let e of enemies) e.draw();
        for(let c of creeps) c.draw();
        
        // attack range indicator on hover? 
        ctx.beginPath();
        ctx.arc(hero.x, hero.y, hero.attackRange, 0, Math.PI*2);
        ctx.strokeStyle = "#e6b42266";
        ctx.lineWidth = 1;
        ctx.stroke();
        
        // mouse target circle
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, 12, 0, Math.PI*2);
        ctx.fillStyle = "#ffaa33aa";
        ctx.fill();
    }
    
    // ========== GAME LOOP ==========
    function updateGame() {
        // move hero towards mouse on right click (handled via canvas event)
        let allUnits = [hero, ...enemies, ...creeps];
        hero.moveToward(mouseX, mouseY, allUnits);
        updateEnemyAI();
        updateCreeps();
        handleCombatAndGold();
        spawnWaveTimer();
        updateUI();
    }
    
    function gameLoop() {
        updateGame();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    // ========== EVENT HANDLERS ==========
    canvas.addEventListener("mousemove", (e) => {
        let rect = canvas.getBoundingClientRect();
        let scaleX = canvas.width/rect.width;
        let scaleY = canvas.height/rect.height;
        let canvasX = (e.clientX - rect.left) * scaleX;
        let canvasY = (e.clientY - rect.top) * scaleY;
        mouseX = Math.min(W-20, Math.max(20, canvasX));
        mouseY = Math.min(H-20, Math.max(20, canvasY));
    });
    
    canvas.addEventListener("click", (e) => {
        let rect = canvas.getBoundingClientRect();
        let scaleX = canvas.width/rect.width;
        let scaleY = canvas.height/rect.height;
        let canvasX = (e.clientX - rect.left) * scaleX;
        let canvasY = (e.clientY - rect.top) * scaleY;
        // check for attack
        let attacked = false;
        for(let i=0; i<enemies.length; i++) {
            let en = enemies[i];
            let d = Math.hypot(canvasX-en.x, canvasY-en.y);
            if(d < en.radius+10) {
                hero.attackTarget(en);
                attacked = true;
                break;
            }
        }
        if(!attacked) {
            for(let c of creeps) {
                if(c.team !== "radiant") {
                    let d = Math.hypot(canvasX-c.x, canvasY-c.y);
                    if(d < c.radius+10) {
                        hero.attackTarget(c);
                        break;
                    }
                }
            }
        }
    });
    
    canvas.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        let rect = canvas.getBoundingClientRect();
        let scaleX = canvas.width/rect.width;
        let scaleY = canvas.height/rect.height;
        let canvasX = (e.clientX - rect.left) * scaleX;
        let canvasY = (e.clientY - rect.top) * scaleY;
        mouseX = Math.min(W-20, Math.max(20, canvasX));
        mouseY = Math.min(H-20, Math.max(20, canvasY));
        rightClick = true;
        return false;
    });
    
    // shop handlers
    document.querySelectorAll(".shop-item").forEach(el => {
        el.addEventListener("click", () => {
            let itemId = el.getAttribute("data-item");
            let item = itemsDB[itemId];
            let cost = { blade:450, armor:550, health:800, heal:100 }[itemId];
            if(hero.gold >= cost) {
                hero.gold -= cost;
                let newItem = { name: item.name, effect: item.effect, use: item.use };
                if(itemId === "heal") newItem = { name: item.name, use: item.use };
                else newItem.effect = item.effect;
                hero.addItem(newItem);
                updateUI();
            }
        });
    });
    
    // initial spawn
    spawnCreeps();
    updateUI();
    gameLoop();
</script>
</body>
</html>
