<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DOTA 2 - Radiant vs Dire | Real MOBA Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Arial', 'Courier New', monospace;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            display: inline-block;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border: 3px solid #c9a03d;
            border-radius: 8px;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        /* Mini-map */
        .minimap {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 200px;
            height: 150px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #c9a03d;
            border-radius: 8px;
            z-index: 20;
            pointer-events: auto;
            cursor: pointer;
        }
        .minimap canvas {
            width: 100%;
            height: 100%;
            border-radius: 6px;
        }

        /* Shop panel */
        .shop-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 260px;
            background: rgba(10,15,30,0.95);
            backdrop-filter: blur(12px);
            border: 2px solid #e6b422;
            border-radius: 12px;
            padding: 12px;
            color: #ffd966;
            font-size: 12px;
            z-index: 25;
            pointer-events: auto;
            font-weight: bold;
            box-shadow: 0 8px 20px black;
        }
        .shop-panel h3 {
            text-align: center;
            margin-bottom: 10px;
            color: #ffcc44;
            font-size: 16px;
        }
        .shop-item {
            background: #1e2a3a;
            margin: 6px 0;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            transition: all 0.1s;
            border-left: 3px solid #e6b422;
        }
        .shop-item:hover {
            background: #e6b422;
            color: #0a0f1e;
            transform: scale(1.02);
        }
        .gold-display {
            background: #000000aa;
            padding: 4px 8px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 10px;
            font-size: 18px;
        }

        /* Hero stats panel */
        .stats-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #e6b422;
            border-radius: 12px;
            padding: 8px 15px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            z-index: 20;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }
        .stats-panel span {
            color: #ffaa44;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="1400" height="800"></canvas>
    <div class="minimap" id="minimapContainer">
        <canvas id="minimapCanvas" width="200" height="150"></canvas>
    </div>
    <div class="shop-panel" id="shopPanel">
        <h3>🏪 SECRET SHOP</h3>
        <div class="gold-display">💰 GOLD: <span id="goldAmount">600</span></div>
        <div class="shop-item" data-item="power_treads">👢 Power Treads (+12 dmg, +10 aspd) - 950g</div>
        <div class="shop-item" data-item="blade_mail">🛡️ Blade Mail (reflect 40% dmg) - 1200g</div>
        <div class="shop-item" data-item="vanguard">❤️ Vanguard (+250 HP, block dmg) - 1500g</div>
        <div class="shop-item" data-item="desolator">⚔️ Desolator (+50 dmg, -6 armor) - 2100g</div>
        <div class="shop-item" data-item="healing_potion">💊 Healing Salve (heal 200) - 100g</div>
    </div>
    <div class="stats-panel">
        🧙‍♂️ LUNA | ❤️ <span id="hpVal">0</span>/<span id="maxHpVal">0</span> | ⚔️ DMG: <span id="dmgVal">0</span> | 🛡️ ARMOR: <span id="armorVal">0</span> | 💀 KILLS: <span id="killsVal">0</span>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const minimapCanvas = document.getElementById('minimapCanvas');
    const miniCtx = minimapCanvas.getContext('2d');
    
    canvas.width = 1400;
    canvas.height = 800;
    
    // ==================== MAP & COLLISION ====================
    const MAP_W = 1400, MAP_H = 800;
    
    // Trees (forest)
    let trees = [];
    for(let i = 0; i < 180; i++) {
        let x = 100 + Math.random() * 500;
        let y = 100 + Math.random() * 600;
        if(Math.hypot(x-700, y-400) > 200) trees.push({x, y, r: 14});
    }
    for(let i = 0; i < 150; i++) {
        let x = 800 + Math.random() * 500;
        let y = 100 + Math.random() * 600;
        if(Math.hypot(x-700, y-400) > 200) trees.push({x, y, r: 14});
    }
    
    // Towers: Radiant (bottom-left area) and Dire (top-right area)
    let towers = [
        { x: 280, y: 620, team: "radiant", hp: 1800, maxHp: 1800, dmg: 65, range: 280, radius: 38, tier: 1 },
        { x: 480, y: 540, team: "radiant", hp: 1800, maxHp: 1800, dmg: 65, range: 280, radius: 38, tier: 1 },
        { x: 1100, y: 220, team: "dire", hp: 1800, maxHp: 1800, dmg: 65, range: 280, radius: 38, tier: 1 },
        { x: 920, y: 300, team: "dire", hp: 1800, maxHp: 1800, dmg: 65, range: 280, radius: 38, tier: 1 },
        { x: 120, y: 720, team: "radiant", hp: 2800, maxHp: 2800, dmg: 95, range: 320, radius: 48, tier: 2, isAncient: false }, // ancient near
        { x: 1280, y: 80, team: "dire", hp: 2800, maxHp: 2800, dmg: 95, range: 320, radius: 48, tier: 2, isAncient: false }
    ];
    
    // Throne (Ancient)
    let radiantThrone = { x: 70, y: 750, team: "radiant", hp: 3200, maxHp: 3200, radius: 55, isThrone: true };
    let direThrone = { x: 1330, y: 50, team: "dire", hp: 3200, maxHp: 3200, radius: 55, isThrone: true };
    
    // ==================== HERO CLASS ====================
    class Hero {
        constructor(x, y, name, team, color) {
            this.x = x; this.y = y; this.name = name; this.team = team;
            this.maxHp = 780; this.hp = 780;
            this.baseDmg = 32; this.dmgBonus = 0;
            this.armor = 4; this.armorBonus = 0;
            this.speed = 3.8;
            this.radius = 24;
            this.attackRange = 130;
            this.attackCd = 0; this.attackSpeed = 0.65;
            this.lastAttack = 0;
            this.gold = 600;
            this.kills = 0;
            this.items = [];
            this.color = color;
        }
        get totalDmg() { return this.baseDmg + this.dmgBonus; }
        get totalArmor() { return this.armor + this.armorBonus; }
        takeDamage(amount) {
            let reduction = this.totalArmor * 0.05 / (1 + this.totalArmor * 0.05);
            let final = Math.max(8, amount * (1 - reduction));
            this.hp -= final;
            if(this.hp <= 0) this.hp = 0;
            return final;
        }
        attackTarget(target) {
            let now = performance.now() / 1000;
            if(now - this.lastAttack < this.attackSpeed) return false;
            let dist = Math.hypot(this.x - target.x, this.y - target.y);
            if(dist < this.attackRange + target.radius) {
                let dmg = this.totalDmg + Math.floor(Math.random() * 12);
                let dealt = target.takeDamage(dmg);
                this.lastAttack = now;
                return true;
            }
            return false;
        }
        moveToward(tx, ty, allObstacles) {
            let dx = tx - this.x, dy = ty - this.y;
            let len = Math.hypot(dx, dy);
            if(len > 2) {
                let move = Math.min(this.speed, len);
                let stepX = (dx/len)*move;
                let stepY = (dy/len)*move;
                let newX = this.x+stepX, newY = this.y+stepY;
                let collide = false;
                for(let o of allObstacles) {
                    if(o === this) continue;
                    if(Math.hypot(newX-o.x, newY-o.y) < this.radius + o.radius) { collide=true; break; }
                }
                for(let t of trees) {
                    if(Math.hypot(newX-t.x, newY-t.y) < this.radius + t.r) { collide=true; break; }
                }
                if(!collide) { this.x=newX; this.y=newY; }
            }
        }
        addItem(item) {
            if(this.items.length < 6) {
                this.items.push(item);
                if(item.effect) item.effect(this);
                return true;
            }
            return false;
        }
        draw() {
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.strokeStyle = "#e6b422";
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.fillStyle = "white";
            ctx.font = "bold 14px Arial";
            ctx.fillText(this.name, this.x-20, this.y-28);
            ctx.fillStyle = "#ff5555";
            ctx.fillRect(this.x-28, this.y-34, 56, 7);
            ctx.fillStyle = "#55ff55";
            ctx.fillRect(this.x-28, this.y-34, 56*(this.hp/this.maxHp), 7);
        }
    }
    
    // ==================== CREEPS ====================
    class Creep {
        constructor(x, y, team, type) {
            this.x=x; this.y=y; this.team=team;
            this.type=type;
            this.maxHp = type==="melee"? 550 : 420;
            this.hp = this.maxHp;
            this.dmg = type==="melee"? 26 : 20;
            this.radius = 20;
            this.attackRange = 75;
            this.lastAttack=0;
            this.attackSpeed=1.0;
            this.speed=1.8;
        }
        takeDamage(amount) { this.hp-=amount; return amount; }
        attackTarget(target) {
            let now=performance.now()/1000;
            if(now-this.lastAttack<this.attackSpeed) return false;
            let dist=Math.hypot(this.x-target.x, this.y-target.y);
            if(dist<this.attackRange+target.radius) {
                target.takeDamage(this.dmg+Math.random()*8);
                this.lastAttack=now;
                return true;
            }
            return false;
        }
        moveToward(target, allUnits) {
            if(!target) return;
            let dx=target.x-this.x, dy=target.y-this.y;
            let len=Math.hypot(dx,dy);
            if(len>5) {
                let move=Math.min(this.speed, len-3);
                let stepX=(dx/len)*move, stepY=(dy/len)*move;
                let newX=this.x+stepX, newY=this.y+stepY;
                let collide=false;
                for(let u of allUnits) if(u!==this && Math.hypot(newX-u.x,newY-u.y)<this.radius+u.radius) collide=true;
                for(let t of trees) if(Math.hypot(newX-t.x,newY-t.y)<this.radius+t.r) collide=true;
                if(!collide) { this.x=newX; this.y=newY; }
            }
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.team==="radiant" ? "#6aab4a" : "#b85c5c";
            ctx.fill();
            ctx.strokeStyle="#222";
            ctx.stroke();
            ctx.fillStyle="white";
            ctx.font="10px Arial";
            ctx.fillText(this.type==="melee"?"⚔️":"🏹", this.x-8, this.y-8);
            ctx.fillStyle="red";
            ctx.fillRect(this.x-15, this.y-18, 30, 4);
            ctx.fillStyle="lime";
            ctx.fillRect(this.x-15, this.y-18, 30*(this.hp/this.maxHp), 4);
        }
    }
    
    // ==================== GLOBAL OBJECTS ====================
    let hero = new Hero(300, 680, "LUNA", "radiant", "#b87c4f");
    let enemies = [new Hero(1150, 120, "ZEUS", "dire", "#6c5c9c")];
    enemies[0].maxHp=720; enemies[0].hp=720;
    let creeps = [];
    let spawnTimer=0;
    let mouseX=hero.x, mouseY=hero.y;
    let isMoving=false;
    
    // items database
    const itemsDB = {
        power_treads: { name:"Power Treads", effect:(h)=>{ h.dmgBonus+=12; h.speed+=0.3; }, desc:"+12 dmg +aspd" },
        blade_mail: { name:"Blade Mail", effect:(h)=>{ h.bladeMail=true; }, desc:"Reflect" },
        vanguard: { name:"Vanguard", effect:(h)=>{ h.maxHp+=250; h.hp+=250; h.block=true; }, desc:"+250 HP" },
        desolator: { name:"Desolator", effect:(h)=>{ h.dmgBonus+=50; h.desolator=true; }, desc:"+50 dmg" },
        healing_potion: { name:"Salve", use:(h)=>{ h.hp=Math.min(h.maxHp, h.hp+200); return true; }, desc:"heal 200" }
    };
    
    function spawnCreepWave() {
        creeps.push(new Creep(180, 660, "radiant", "melee"));
        creeps.push(new Creep(220, 640, "radiant", "ranged"));
        creeps.push(new Creep(1240, 100, "dire", "melee"));
        creeps.push(new Creep(1200, 130, "dire", "ranged"));
        if(Math.random()<0.4) creeps.push(new Creep(210, 650, "radiant", "melee"));
        if(Math.random()<0.4) creeps.push(new Creep(1220, 110, "dire", "melee"));
    }
    
    // AI for enemy hero
    function updateEnemyAI() {
        for(let e of enemies) {
            let distToHero = Math.hypot(e.x-hero.x, e.y-hero.y);
            let all = [hero, ...enemies, ...creeps];
            if(distToHero < 320) {
                e.moveToward(hero.x, hero.y, all);
                e.attackTarget(hero);
            } else {
                let targetCreep = creeps.find(c=>c.team==="radiant" && Math.hypot(c.x-e.x, c.y-e.y)<500);
                if(targetCreep) e.moveToward(targetCreep.x, targetCreep.y, all);
                else e.moveToward(500, 550, all);
                for(let c of creeps) if(c.team==="radiant" && Math.hypot(e.x-c.x, e.y-c.y)<e.attackRange+20) e.attackTarget(c);
            }
            // attack towers
            for(let tow of towers) if(tow.team!==e.team && Math.hypot(e.x-tow.x, e.y-tow.y)<e.attackRange+40) e.attackTarget(tow);
            if(radiantThrone.team!==e.team && Math.hypot(e.x-radiantThrone.x, e.y-radiantThrone.y)<e.attackRange+50) e.attackTarget(radiantThrone);
        }
    }
    
    function updateCreepsAI() {
        for(let c of creeps) {
            let target=null;
            if(c.team==="radiant") {
                let enemiesNear = [...enemies, ...creeps.filter(cr=>cr.team==="dire")];
                let closest=null, minD=999;
                for(let t of enemiesNear) { let d=Math.hypot(c.x-t.x, c.y-t.y); if(d<minD){minD=d; closest=t;} }
                if(!closest) { let towerTarget = towers.find(t=>t.team==="dire"); if(towerTarget) closest=towerTarget; }
                if(!closest && direThrone) closest=direThrone;
                target=closest;
            } else {
                let enemiesNear = [hero, ...creeps.filter(cr=>cr.team==="radiant")];
                let closest=null, minD=999;
                for(let t of enemiesNear) { let d=Math.hypot(c.x-t.x, c.y-t.y); if(d<minD){minD=d; closest=t;} }
                if(!closest) { let towerTarget = towers.find(t=>t.team==="radiant"); if(towerTarget) closest=towerTarget; }
                if(!closest && radiantThrone) closest=radiantThrone;
                target=closest;
            }
            if(target) {
                let allUnits = [hero, ...enemies, ...creeps];
                c.moveToward(target, allUnits);
                c.attackTarget(target);
            }
        }
    }
    
    function updateTowerAttacks() {
        for(let tow of towers) {
            if(tow.hp<=0) continue;
            let target=null;
            if(tow.team==="radiant") target = [...enemies, ...creeps.filter(c=>c.team==="dire")].find(u=>Math.hypot(tow.x-u.x, tow.y-u.y)<tow.range);
            else target = [hero, ...creeps.filter(c=>c.team==="radiant")].find(u=>Math.hypot(tow.x-u.x, tow.y-u.y)<tow.range);
            if(target) {
                if(!tow.lastShot || performance.now()/1000 - tow.lastShot > 1.1) {
                    target.takeDamage(tow.dmg);
                    tow.lastShot = performance.now()/1000;
                }
            }
        }
        // throne attacks
        if(radiantThrone.hp>0) {
            let target = [...enemies, ...creeps.filter(c=>c.team==="dire")].find(u=>Math.hypot(radiantThrone.x-u.x, radiantThrone.y-u.y)<280);
            if(target && (!radiantThrone.lastShot || performance.now()/1000 - radiantThrone.lastShot > 1.2)) {
                target.takeDamage(70);
                radiantThrone.lastShot = performance.now()/1000;
            }
        }
        if(direThrone.hp>0) {
            let target = [hero, ...creeps.filter(c=>c.team==="radiant")].find(u=>Math.hypot(direThrone.x-u.x, direThrone.y-u.y)<280);
            if(target && (!direThrone.lastShot || performance.now()/1000 - direThrone.lastShot > 1.2)) {
                target.takeDamage(70);
                direThrone.lastShot = performance.now()/1000;
            }
        }
    }
    
    function handleDeathsAndGold() {
        for(let i=0;i<creeps.length;i++) {
            let c=creeps[i];
            if(c.hp<=0) {
                if(Math.hypot(hero.x-c.x, hero.y-c.y)<200) { hero.gold += (c.type==="melee"?48:38); }
                creeps.splice(i,1); i--;
            }
        }
        for(let i=0;i<enemies.length;i++) {
            let e=enemies[i];
            if(e.hp<=0) {
                if(Math.hypot(hero.x-e.x, hero.y-e.y)<250) { hero.gold+=180; hero.kills++; }
                e.hp=e.maxHp; e.x=1200+Math.random()*100; e.y=80+Math.random()*80;
            }
        }
        for(let i=0;i<towers.length;i++) {
            let t=towers[i];
            if(t.hp<=0 && !t.destroyed) { t.destroyed=true; hero.gold+=250; }
        }
        if(hero.hp<=0) { hero.hp=hero.maxHp; hero.x=250; hero.y=700; hero.gold=Math.max(0, hero.gold-100); }
    }
    
    function updateMovement() {
        let allUnits = [hero, ...enemies, ...creeps];
        if(isMoving) hero.moveToward(mouseX, mouseY, allUnits);
    }
    
    // ==================== DRAW MAP & UI ====================
    function drawMap() {
        ctx.fillStyle = "#2c5a2c";
        ctx.fillRect(0,0,MAP_W,MAP_H);
        ctx.fillStyle = "#5a3a1a";
        for(let t of trees) { ctx.beginPath(); ctx.arc(t.x,t.y,t.r,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#3a2a0a"; ctx.fill(); ctx.fillStyle="#5a3a1a"; }
        ctx.fillStyle = "#8b6946";
        ctx.font="bold 24px Arial";
        ctx.fillText("⚔️ RADIANT", 40, 60);
        ctx.fillStyle = "#a55a5a";
        ctx.fillText("💀 DIRE", 1200, 100);
        // draw towers
        for(let t of towers) {
            ctx.fillStyle = t.team==="radiant" ? "#c9a87b" : "#8b4c4c";
            ctx.beginPath(); ctx.arc(t.x,t.y,t.radius-6,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="white"; ctx.fillText("🏰", t.x-12, t.y-8);
            ctx.fillStyle="#ff6666"; ctx.fillRect(t.x-25, t.y-38, 50, 6);
            ctx.fillStyle="#66ff66"; ctx.fillRect(t.x-25, t.y-38, 50*(t.hp/t.maxHp), 6);
        }
        // throne
        ctx.fillStyle="#d4af37"; ctx.beginPath(); ctx.arc(radiantThrone.x,radiantThrone.y,radiantThrone.radius,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="gold"; ctx.fillText("👑", radiantThrone.x-12, radiantThrone.y-8);
        ctx.fillStyle="#d4af37"; ctx.beginPath(); ctx.arc(direThrone.x,direThrone.y,direThrone.radius,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="gold"; ctx.fillText("👑", direThrone.x-12, direThrone.y-8);
    }
    
    function drawMinimap() {
        miniCtx.fillStyle="#1e3a1e"; miniCtx.fillRect(0,0,200,150);
        for(let t of trees) { miniCtx.fillStyle="#2a4a1a"; miniCtx.fillRect(t.x/7, t.y/5.33, 2,2); }
        for(let t of towers) { miniCtx.fillStyle=t.team==="radiant"?"#ffaa66":"#ff6666"; miniCtx.fillRect(t.x/7-2, t.y/5.33-2, 4,4); }
        miniCtx.fillStyle="#ff5555"; miniCtx.fillRect(hero.x/7-2, hero.y/5.33-2, 5,5);
        for(let e of enemies) { miniCtx.fillStyle="#aa5555"; miniCtx.fillRect(e.x/7-2, e.y/5.33-2, 4,4); }
    }
    
    function updateUI() {
        document.getElementById('hpVal').innerText = Math.floor(hero.hp);
        document.getElementById('maxHpVal').innerText = hero.maxHp;
        document.getElementById('dmgVal').innerText = hero.totalDmg;
        document.getElementById('armorVal').innerText = hero.totalArmor;
        document.getElementById('killsVal').innerText = hero.kills;
        document.getElementById('goldAmount').innerText = Math.floor(hero.gold);
    }
    
    // ==================== GAME LOOP ====================
    function gameUpdate() {
        updateMovement();
        updateEnemyAI();
        updateCreepsAI();
        updateTowerAttacks();
        handleDeathsAndGold();
        spawnTimer++;
        if(spawnTimer>240) { spawnCreepWave(); spawnTimer=0; }
        updateUI();
    }
    
    function render() {
        drawMap();
        for(let c of creeps) c.draw();
        for(let t of towers) if(t.hp>0) { ctx.fillStyle=t.team==="radiant"?"#c9a87b":"#8b4c4c"; ctx.beginPath(); ctx.arc(t.x,t.y,t.radius-6,0,Math.PI*2); ctx.fill(); ctx.fillStyle="white"; ctx.fillText("🏰", t.x-12, t.y-8); ctx.fillStyle="#ff6666"; ctx.fillRect(t.x-25, t.y-38, 50, 6); ctx.fillStyle="#66ff66"; ctx.fillRect(t.x-25, t.y-38, 50*(t.hp/t.maxHp), 6); }
        if(radiantThrone.hp>0){ ctx.fillStyle="#d4af37"; ctx.beginPath(); ctx.arc(radiantThrone.x,radiantThrone.y,radiantThrone.radius,0,Math.PI*2); ctx.fill(); ctx.fillStyle="gold"; ctx.fillText("👑", radiantThrone.x-12, radiantThrone.y-8); }
        if(direThrone.hp>0){ ctx.fillStyle="#d4af37"; ctx.beginPath(); ctx.arc(direThrone.x,direThrone.y,direThrone.radius,0,Math.PI*2); ctx.fill(); ctx.fillStyle="gold"; ctx.fillText("👑", direThrone.x-12, direThrone.y-8); }
        hero.draw();
        for(let e of enemies) e.draw();
        drawMinimap();
    }
    
    function animate() {
        gameUpdate();
        render();
        requestAnimationFrame(animate);
    }
    
    // ==================== CONTROLS ====================
    canvas.addEventListener("mousemove", (e) => {
        let rect=canvas.getBoundingClientRect();
        let sx=canvas.width/rect.width, sy=canvas.height/rect.height;
        let cx=(e.clientX-rect.left)*sx, cy=(e.clientY-rect.top)*sy;
        mouseX=Math.min(MAP_W-30, Math.max(30, cx));
        mouseY=Math.min(MAP_H-30, Math.max(30, cy));
    });
    canvas.addEventListener("click", (e) => { isMoving=true; });
    canvas.addEventListener("contextmenu", (e) => { e.preventDefault(); isMoving=true; return false; });
    document.querySelectorAll(".shop-item").forEach(el=>{
        el.addEventListener("click",()=>{
            let id=el.getAttribute("data-item");
            let item=itemsDB[id];
            let cost={power_treads:950, blade_mail:1200, vanguard:1500, desolator:2100, healing_potion:100}[id];
            if(hero.gold>=cost){
                hero.gold-=cost;
                if(item.use) hero.addItem({name:item.name, use:item.use});
                else hero.addItem({name:item.name, effect:item.effect});
                updateUI();
            }
        });
    });
    minimapCanvas.addEventListener("click", (e)=>{
        let rect=minimapCanvas.getBoundingClientRect();
        let rx=(e.clientX-rect.left)/rect.width*200;
        let ry=(e.clientY-rect.top)/rect.height*150;
        hero.x=Math.min(MAP_W-40, Math.max(40, rx*7));
        hero.y=Math.min(MAP_H-40, Math.max(40, ry*5.33));
        isMoving=true;
    });
    
    spawnCreepWave();
    animate();
</script>
</body>
</html>
